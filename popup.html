<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h3 {
      margin: 0 0 10px 0;
      color: #1a73e8;
    }
    .setting {
      margin: 10px 0;
    }
    label {
      display: block;
      margin: 5px 0;
      font-size: 12px;
      color: #5f6368;
    }
    select, input {
      width: 100%;
      padding: 5px;
      margin-top: 3px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #1557b0;
    }
  </style>
</head>
<body>
  <h3> CanvasToDocs Settings</h3>
  
  <div class="setting">
    <label>Default document type:</label>
    <select id="defaultDocType">
      <option value="docs">Google Docs</option>
      <option value="sheets">Google Sheets (COMING SOON)</option>
      <option value="slides">Google Slides (COMING SOON)</option>
    </select>
  </div>
  
  <div class="setting">
    <label>Button position:</label>
    <select id="buttonPosition">
      <option value="bottom-right">Bottom Right</option>
      <option value="bottom-left">Bottom Left</option>
      <option value="top-right">Top Right</option>
      <option value="top-left">Top Left</option>
    </select>
  </div>
  
  <div class="setting">
    <label>Custom selectors (comma-separated):</label>
    <input type="text" id="customSelectors" placeholder=".my-title, #assignment-name">
  </div>
  
  <button id="saveBtn">Save Settings</button>
  
  <script src="js/popup.js"></script>
</body>
</html>
